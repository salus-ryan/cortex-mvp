<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cortex Forge Control Room</title>
  <style>
    :root{color-scheme:dark;--bg:#0b0f14;--card:#121923;--line:#263241;--fg:#e6edf3;--muted:#8fa3b8;--ok:#3ddc97;--bad:#ef476f;--warn:#ffd166}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.45 system-ui,sans-serif}
    main{max-width:880px;margin:0 auto;padding:22px} header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}
    h1{margin:0;font-size:24px} h2{margin:0 0 10px;font-size:16px}.muted{color:var(--muted);font-size:13px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 8px 30px #0003}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.stat{padding:12px;border:1px solid var(--line);border-radius:12px;background:#0d141d}.label{color:var(--muted);font-size:12px}.value{font-size:18px;margin-top:4px}.ok{color:var(--ok)}.bad{color:var(--bad)}.warn{color:var(--warn)}
    button{border:1px solid #3a4b60;background:#203044;color:var(--fg);border-radius:12px;padding:11px 13px;cursor:pointer;font-weight:650}button:hover{background:#2a3d55}.danger{border-color:#6b2840;background:#351724}.primary{background:#1d4f3d;border-color:#35775d}
    input{width:100%;background:#081018;color:var(--fg);border:1px solid #3a4b60;border-radius:10px;padding:10px;margin:6px 0}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.pill{border:1px solid var(--line);border-radius:999px;padding:4px 9px;color:var(--muted)}
    pre{white-space:pre-wrap;word-break:break-word;background:#081018;border:1px solid var(--line);border-radius:12px;padding:12px;max-height:360px;overflow:auto}details{margin-top:10px}summary{cursor:pointer;color:var(--muted)}
  </style>
</head>
<body>
<main>
  <header>
    <div><h1>Cortex Forge</h1><div class="muted">simple control room · witness gated</div></div>
    <div class="row"><span id="heartbeat" class="pill">loading</span><button onclick="refresh()">Refresh</button></div>
  </header>

  <section class="card">
    <h2>Now</h2>
    <div class="grid">
      <div class="stat"><div class="label">Forge</div><div id="forgeState" class="value">—</div></div>
      <div class="stat"><div class="label">Docker</div><div id="dockerState" class="value">—</div></div>
      <div class="stat"><div class="label">App</div><div id="appState" class="value">cortex</div></div>
      <div class="stat"><div class="label">Latest job</div><div id="jobState" class="value">—</div></div>
    </div>
  </section>

  <section class="card">
    <h2>Operate</h2>
    <input id="app" value="cortex" aria-label="app name" />
    <div class="row">
      <button class="primary" onclick="health()">Health</button>
      <button onclick="logs()">Logs</button>
      <button onclick="check()">Check</button>
    </div>
    <pre id="out">Ready.</pre>
  </section>

  <section class="card">
    <h2>Change</h2>
    <div class="muted">Mutations require witness + confirmation. No arbitrary shell.</div>
    <input id="token" placeholder="Forge token, if configured" type="password" />
    <input id="witness" placeholder="witness name" />
    <label class="muted"><input id="confirmed" type="checkbox" /> confirmed</label>
    <div class="row" style="margin-top:8px">
      <button onclick="mutate('update')">Update</button>
      <button class="primary" onclick="mutate('deploy')">Deploy</button>
      <button class="danger" onclick="mutate('rollback')">Rollback</button>
    </div>
    <pre id="change">No change requested.</pre>
  </section>

  <section class="card">
    <h2>Job</h2>
    <div class="row"><input id="jobid" placeholder="job id or latest" style="flex:1;min-width:220px"/><button onclick="job()">View</button></div>
    <pre id="job">No job loaded.</pre>
  </section>

  <details class="card">
    <summary>Raw platform detail</summary>
    <pre id="raw">loading…</pre>
  </details>
</main>
<script>
const $=id=>document.getElementById(id); const pretty=x=>JSON.stringify(x,null,2);
async function api(path,opts={}){const h=opts.headers||{}; if(opts.body)h['content-type']='application/json'; if($('token')?.value)h.authorization='Bearer '+$('token').value; const r=await fetch(path,{...opts,headers:h}); const t=await r.text(); let d; try{d=JSON.parse(t)}catch{d={raw:t}} if(!r.ok)d._http_status=r.status; return d}
function set(id,text,cls=''){const e=$(id); e.textContent=text; e.className='value '+cls}
async function refresh(){try{const s=await api('/forge/status'); $('raw').textContent=pretty(s); $('heartbeat').textContent=s.status||'ok'; $('heartbeat').className='pill ok'; set('forgeState',s.status||'ok','ok'); set('dockerState',String(!!s.docker_available),s.docker_available?'ok':'bad'); const j=await api('/forge/job?id=latest'); set('jobState',j.status||'none',j.status==='ok'?'ok':(j.status==='running'?'warn':''));}catch(e){$('heartbeat').textContent='error';$('heartbeat').className='pill bad';$('raw').textContent=String(e)}}
async function health(){const app=$('app').value||'cortex'; $('appState').textContent=app; $('out').textContent=pretty(await api(`/forge/apps/${app}/health`))}
async function logs(){const app=$('app').value||'cortex'; $('out').textContent=pretty(await api(`/forge/apps/${app}/logs`))}
async function check(){const app=$('app').value||'cortex'; $('out').textContent=pretty(await api(`/forge/apps/${app}/check`))}
async function mutate(action){const app=$('app').value||'cortex'; const body={witness:$('witness').value,confirmed:$('confirmed').checked,async:true}; const d=await api(`/forge/apps/${app}/${action}`,{method:'POST',body:JSON.stringify(body)}); $('change').textContent=pretty(d); if(d.id)$('jobid').value=d.id; await refresh()}
async function job(){const id=$('jobid').value||'latest'; $('job').textContent=pretty(await api(id==='latest'?'/forge/job?id=latest':`/forge/jobs/${id}`))}
refresh(); setInterval(refresh,15000);
</script>
</body>
</html>
